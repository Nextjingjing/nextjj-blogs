<div style="margin-top: 50px; display: flex; justify-content: space-between; align-items: center;">
    <div>
        {{ if .Get "prev-link" }}
        <a href="{{ .Get "prev-link" }}" style="background-color: var(--card-background); border: 1px solid var(--main-border-color); padding: 10px 20px; border-radius: 8px; text-decoration: none; color: var(--card-text-color); font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: inline-block;">
            ← {{ .Get "prev-text" | default "หน้าก่อนหน้า" }}
        </a>
        {{ end }}
    </div>

    <div>
        {{ if .Get "next-link" }}
        <a href="{{ .Get "next-link" }}" style="background-color: var(--card-background); border: 1px solid var(--main-border-color); padding: 10px 20px; border-radius: 8px; text-decoration: none; color: var(--card-text-color); font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: inline-block;">
            {{ .Get "next-text" | default "ตอนถัดไป" }} →
        </a>
        {{ end }}
    </div>
</div>
